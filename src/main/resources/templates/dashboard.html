<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
    <meta charset="UTF-8">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="main-header">
    <h1>💊 Online Pharmacy</h1>

    <nav class="nav">
        <span id="welcomeMsg" class="welcome-text"></span>
        <a href="/medicines">Home</a>
        <a href="/cart">Cart</a>
        <a href="/orders">Orders</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
</header>

<!-- PAGE TITLE -->
<h2 class="title">👋 Welcome to Your Dashboard</h2>

<!-- ✅ SEARCH + FILTER (MOVE HERE) -->
<div style="display:flex; gap:15px; margin:20px; justify-content:center;">

    <input 
        type="text" 
        id="searchInput" 
        placeholder="Search medicines..."
        style="padding:8px; width:200px;"
    >

    <select id="categoryFilter" style="padding:8px;">
        <option value="">All Categories</option>
        <option value="Fever">Fever</option>
        <option value="Vitamins">Vitamins</option>
        <option value="Cold & Cough">Cold & Cough</option>
        <option value="Digestion">Digestion</option>
    </select>

</div>

<!-- MEDICINES SECTION -->
<div class="container">
    <div id="medicines" class="grid"></div>
</div>

<!-- JS -->
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/dashboard.js"></script>

</body>
</html>
