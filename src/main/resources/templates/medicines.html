<!DOCTYPE html>
<html>
<head>
    <title>Medicines</title>

    <link rel="stylesheet" href="/css/style.css">
    <meta charset="UTF-8">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body onload="checkAuth()">

<!-- HEADER -->
<header class="main-header">
    <h1>💊 Online Pharmacy</h1>

    <nav class="nav">
        <a href="/dashboard">Home</a>
        <a href="/cart">Cart</a>
        <a href="/orders">Orders</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
</header>

<!-- PAGE TITLE -->
<h2 class="title">💊 Available Medicines</h2>

<!-- SEARCH + FILTER -->
<div style="text-align:center; margin:20px;">
    <input type="text" id="searchInput" placeholder="Search medicines..." 
           style="padding:10px; width:250px; border-radius:8px;">

    <select id="categoryFilter" style="padding:10px; border-radius:8px;">
        <option value="">All Categories</option>
        <option value="Fever">Fever</option>
        <option value="Cold">Cold</option>
        <option value="Pain">Pain</option>
        <option value="Vitamins">Vitamins</option>
    </select>
</div>

<!-- MEDICINE GRID -->
<div class="container">
    <div id="medicineList" class="grid"></div>
</div>

<!-- ✅ SCRIPTS (ORDER VERY IMPORTANT) -->
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/medicine.js"></script>

</body>
</html>
